<svg width="900" height="220" viewBox="0 0 900 220"
     xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%">
      <stop offset="0%" stop-color="#00C6FF">
        <animate attributeName="stop-color"
                 values="#00C6FF;#7F5AF0;#00FFD5;#00C6FF"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>

      <stop offset="100%" stop-color="#7F5AF0">
        <animate attributeName="stop-color"
                 values="#7F5AF0;#00FFD5;#00C6FF;#7F5AF0"
                 dur="6s"
                 repeatCount="indefinite"/>
      </stop>

      <animateTransform
          attributeName="gradientTransform"
          type="translate"
          values="-1 0;1 0;-1 0"
          dur="6s"
          repeatCount="indefinite"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="900" height="220"
        rx="25"
        fill="#0D1117"/>

  <g>

    <circle cx="120" cy="110"
            r="34"
            fill="url(#gradient)"
            filter="url(#glow)">
      <animate attributeName="r"
               values="34;40;34"
               dur="2s"
               repeatCount="indefinite"/>

      <animate attributeName="opacity"
               values="0.8;1;0.8"
               dur="2s"
               repeatCount="indefinite"/>
    </circle>

    <circle cx="120" cy="110"
            r="55"
            fill="none"
            stroke="url(#gradient)"
            stroke-width="2">

      <animate attributeName="r"
               values="45;70;45"
               dur="3s"
               repeatCount="indefinite"/>

      <animate attributeName="opacity"
               values="0.8;0;0.8"
               dur="3s"
               repeatCount="indefinite"/>
    </circle>

  </g>

  <text x="190"
        y="125"
        font-family="Segoe UI,Arial,sans-serif"
        font-size="58"
        font-weight="700"
        fill="url(#gradient)"
        filter="url(#glow)">

      APPLE

      <animate attributeName="opacity"
               values="0.7;1;0.7"
               dur="2.5s"
               repeatCount="indefinite"/>
  </text>

  <rect x="190"
        y="145"
        width="480"
        height="4"
        rx="2"
        fill="url(#gradient)">

      <animate attributeName="width"
               values="0;480;0"
               dur="4s"
               repeatCount="indefinite"/>
  </rect>

  <circle cx="-20" cy="70" r="3" fill="#00C6FF">
      <animate attributeName="cx"
               values="-20;920"
               dur="7s"
               repeatCount="indefinite"/>
  </circle>

  <circle cx="-100" cy="160" r="2" fill="#7F5AF0">
      <animate attributeName="cx"
               values="-100;950"
               dur="9s"
               repeatCount="indefinite"/>
  </circle>

  <circle cx="-150" cy="40" r="2" fill="#00FFD5">
      <animate attributeName="cx"
               values="-150;950"
               dur="11s"
               repeatCount="indefinite"/>
  </circle>

</svg>
